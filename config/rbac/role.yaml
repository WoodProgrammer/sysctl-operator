---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - sysctl.k8s.io
  resources:
  - sysctlprofiles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sysctl.k8s.io
  resources:
  - sysctlprofiles/finalizers
  verbs:
  - update
- apiGroups:
  - sysctl.k8s.io
  resources:
  - sysctlprofiles/status
  verbs:
  - get
  - patch
  - update
